# This workflow runs the pytest suite on every PR and push to main.
# Modeled on LeRobot's fast_tests.yml, collapsed to a single dependency tier.
name: Tests
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "lelab/**"
      - "tests/**"
      - ".github/workflows/tests.yml"
      - "pyproject.toml"
  push:
    branches:
      - main
    paths:
      - "lelab/**"
      - "tests/**"
      - ".github/workflows/tests.yml"
      - "pyproject.toml"

env:
  PYTHON_VERSION: "3.12"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          lfs: true

      # lerobot is a transitive dep that needs these native libs at install /
      # import time. List taken from LeRobot's fast_tests.yml.
      - name: Install apt dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential git \
          curl libglib2.0-0 libegl1-mesa-dev ffmpeg \
          libusb-1.0-0-dev speech-dispatcher libgeos-dev portaudio19-dev

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lelab + test extras
        run: pip install -e ".[test]"

      - name: Run pytest
        run: pytest tests -vv --maxfail=10
