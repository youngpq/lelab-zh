name: Rebuild frontend/dist

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '!frontend/dist/**'
      - '!frontend/__init__.py'
      - '.github/workflows/build_frontend.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          lfs: true
          persist-credentials: false
      - uses: actions/setup-node@v6.4.0
        with:
          # Vite 8 requires ^20.19.0 or >=22.12.0; on Node 18 `npm run build`
          # fails, which silently stops dist from being rebuilt.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Commit dist if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain frontend/dist)" ]]; then
            git add frontend/dist
            git commit -m "ci: rebuild frontend/dist [skip ci]"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
          else
            echo "frontend/dist already up to date"
          fi
